            right: 30px;

            height: 12px;
            border-radius: 4px;
            margin-right: 12px;

8125],[113.388831816406,27.4206740546875],[113.355731230469,27.379341046875],[113.328914824219,27.3693971992188],[113.312899199219,27.3893971992188],[113.307345,27.3938430000001],[113.299918242188,27.4375563789063],[113.26170046875,27.4481984687501],[113.22298953125,27.47948753125],[113.175543242188,27.4926979804688],[113.203519316406,27.539077375],[113.189049101563,27.5502468085938],[113.165750761719,27.607173078125],[113.19298953125,27.6281984687501],[113.204022246094,27.6424929023438],[113.201605253906,27.6588430000001],[113.203748808594,27.6733498359376],[113.225994902344,27.6905202460937],[113.242345,27.6881032539063],[113.268138457031,27.6919167304688],[113.294896269531,27.7265822578125],[113.288765898438,27.7680666328126],[113.321954375,27.7480471015626],[113.340943632813,27.7508522773437],[113.35447390625,27.7994411445312],[113.351600371094,27.8188771796876],[113.357345,27.8538430000001],[113.402806425781,27.8583815742188],[113.413787871094,27.8957936835938],[113.455201445313,27.913755109375],[113.472806425781,27.9283815742187],[113.481883574219,27.9393044257813],[113.512806425781,27.9483815742188],[113.529420195313,27.9683815742188],[113.562806425781,27.9593044257813]]]]}}]};

        // 计算每个区块的精确中心
        function getPolygonCenter(coords) {
            let minLng = Infinity, maxLng = -Infinity;
            let minLat = Infinity, maxLat = -Infinity;
            
            coords.forEach(coord => {
                minLng = Math.min(minLng, coord[0]);
                maxLng = Math.max(maxLng, coord[0]);
                minLat = Math.min(minLat, coord[1]);
                maxLat = Math.max(maxLat, coord[1]);
            });
            
            return {
                lng: (minLng + maxLng) / 2,
                lat: (minLat + maxLat) / 2
            };
        }

        
        // 县到市的映射
        const countyToCity = {};
        cityData.forEach(city => {
            city.counties.forEach(county => {
                countyToCity[county] = city;
            });
        });

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 70);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.minDistance = 20;
        controls.maxDistance = 150;

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(50, 80, 50);
        scene.add(dirLight);
        
        const lights = [
            { color: 0x00d4ff, pos: [20, 30, 20] },
            { color: 0xff6b6b, pos: [-20, 30, -20] },
            { color: 0xc56cf0, pos: [0, 30, -30] }
        ];
        lights.forEach(l => {
            const pl = new THREE.PointLight(l.color, 0.3, 100);
            pl.position.set(...l.pos);
            scene.add(pl);
        });

        // 坐标转换 - 使用GeoJSON中心点作为参考
        const centerLng = 113.5;
        const centerLat = 27.0;
        const scale = 80;
        
        function latLngToScene(lng, lat) {
            // GeoJSON是[lng, lat]，转3D坐标
            const x = (lng - centerLng) * scale;
            const z = (lat - centerLat) * scale;
            return { x: x, z: -z };  // 注意z取反
        }

        const meshes = [];
        const cityMeshGroups = {};  // 每个城市对应的所有mesh
        const cityCenters = {};  // 每个城市的中心位置
        
        // 先创建地图并收集每个城市的中心
        geoData.features.forEach(feature => {
            const countyName = feature.properties.name;
            const city = countyToCity[countyName];
            if (!city) return;
            
            const cityName = city.name;
            const color = city.color;
            const coordinates = feature.geometry.coordinates;

            if (!cityMeshGroups[cityName]) {
                cityMeshGroups[cityName] = [];
            }

            coordinates.forEach(polygon => {
                const shape = new THREE.Shape();
                const points = polygon[0];
                if (!points || points.length < 3) return;
                
                const first = latLngToScene(points[0][0], points[0][1]);
                shape.moveTo(first.x, first.z);
                for (let i = 1; i < points.length; i++) { 
                    const p = latLngToScene(points[i][0], points[i][1]); 
                    shape.lineTo(p.x, p.z); 
                }

                const geometry = new THREE.ExtrudeGeometry(shape, { depth: 6, bevelEnabled: true, bevelThickness: 0.5, bevelSize: 0.3, bevelSegments: 3 });
                geometry.rotateX(-Math.PI / 2);
                
                const material = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.2, shininess: 100, transparent: true, opacity: 0.85 });
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.userData = { cityName: cityName, countyName: countyName, floatSpeed: 0.2 + Math.random() * 0.2, floatOffset: Math.random() * Math.PI * 2 };
                scene.add(mesh); 
                meshes.push(mesh);
                cityMeshGroups[cityName].push(mesh);
                
                // 边框
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.4, transparent: true }));
                scene.add(line);
            });
            
            // 计算该县的中心
            const coords = coordinates[0][0];
            const center = getPolygonCenter(coords);
            const scenePos = latLngToScene(center.lng, center.lat);
            
            if (!cityCenters[cityName]) {
                cityCenters[cityName] = { x: 0, z: 0, count: 0 };
            }
            cityCenters[cityName].x += scenePos.x;
            cityCenters[cityName].z += scenePos.z;
            cityCenters[cityName].count++;
        });

        // 计算每个城市的平均中心
        Object.keys(cityCenters).forEach(cityName => {
            const c = cityCenters[cityName];
            if (c.count > 0) {
                cityCenters[cityName].x /= c.count;
                cityCenters[cityName].z /= c.count;
            }
        });

        // 圆柱体
        const cylinders = {};
        
        function createCylinder(cityName) {
            const city = cityData.find(c => c.name === cityName);
            if (!city) return;
            
            const height = 25 + Math.random() * 15;
            const color = city.color;
            const center = cityCenters[cityName];
            
            const cylGeom = new THREE.CylinderGeometry(1.2, 1.8, height, 32);
            const cylMat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.5, shininess: 120, transparent: true, opacity: 0.95 });
            const cylinder = new THREE.Mesh(cylGeom, cylMat);
            
            // 从该城市的中心位置升起
            cylinder.position.set(center.x, 0, center.z);
            
            // 顶部发光球
            const sphereGeom = new THREE.SphereGeometry(2, 32, 32);
            const sphereMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.8, shininess: 150 });
            const sphere = new THREE.Mesh(sphereGeom, sphereMat);
            sphere.position.y = height / 2 + 1;
            cylinder.add(sphere);
            
            // 光柱
            const glowGeom = new THREE.CylinderGeometry(2, 2.5, height, 32, 1, true);
            const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            cylinder.add(glow);
            
            cylinder.userData = { cityName: cityName, rising: true };
            cylinder.scale.y = 0.001;
            scene.add(cylinder);
            cylinders[cityName] = cylinder;
        }

        function toggleCylinder(cityName) {
            if (cylinders[cityName]) {
                cylinders[cityName].userData.rising = false;
                cylinders[cityName].userData.shrinking = true;
            } else {
                createCylinder(cityName);
            }
            updatePanel();
        }

        const cityPanel = document.getElementById('cityPanel');
        function updatePanel() {
            cityPanel.innerHTML = '<h3>区县列表</h3>';
            cityData.forEach(city => {
                const div = document.createElement('div');
                div.className = 'city-item' + (cylinders[city.name] ? ' active' : '');
                div.innerHTML = `<div class="city-color" style="background:#${city.color.toString(16).padStart(6,'0')};box-shadow: 0 0 10px #${city.color.toString(16).padStart(6,'0')}"></div><span class="city-name">${city.name}</span>`;
                div.onclick = () => toggleCylinder(city.name);
                cityPanel.appendChild(div);
            });
        }
        updatePanel();
        document.getElementById('loading').style.display = 'none';

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        renderer.domElement.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);
            if (intersects.length > 0) {
                const cityName = intersects[0].object.userData.cityName;
                if (cityName) {
                    toggleCylinder(cityName);
                    tooltip.innerHTML = `<strong>${cityName}</strong>`;
                    tooltip.style.left = event.clientX + 15 + 'px';
                    tooltip.style.top = event.clientY + 15 + 'px';
                    tooltip.style.display = 'block';
                    setTimeout(() => tooltip.style.display = 'none', 1500);
                }
            }
        });

        const base = new THREE.Mesh(new THREE.CircleGeometry(70, 64), new THREE.MeshBasicMaterial({ color: 0x0a0a1a, transparent: true, opacity: 0.9 }));
        base.rotation.x = -Math.PI / 2; 
        base.position.y = -3;
        scene.add(base);

        const grid = new THREE.GridHelper(140, 20, 0x1a1a3a, 0x0a0a1a);
        grid.position.y = -2;
        scene.add(grid);

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            meshes.forEach(mesh => {
                const { floatSpeed, floatOffset } = mesh.userData;
                mesh.position.y = Math.sin(time * floatSpeed + floatOffset) * 0.8;
            });
            
            Object.values(cylinders).forEach(cyl => {
                if (cyl.userData.rising && cyl.scale.y < 1) {
                    cyl.scale.y += 0.03;
                    if (cyl.scale.y > 1) cyl.scale.y = 1;
                }
                if (cyl.userData.shrinking) {
                    cyl.scale.y -= 0.05;
                    if (cyl.scale.y <= 0.001) {
                        scene.remove(cyl);
                        delete cylinders[cyl.userData.cityName];
                        updatePanel();
                    }
                }
            });
            
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
