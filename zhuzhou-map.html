<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株洲市 · 3D 地图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030712;
            --bg-surface: #0a0f1a;
            --bg-elevated: #111827;
            --accent-cyan: #00f5ff;
            --accent-magenta: #ff00aa;
            --accent-amber: #ffaa00;
            --accent-violet: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --glow-cyan: 0 0 20px rgba(0, 245, 255, 0.5), 0 0 40px rgba(0, 245, 255, 0.2);
            --glow-magenta: 0 0 20px rgba(255, 0, 170, 0.5), 0 0 40px rgba(255, 0, 170, 0.2);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--text-primary);
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* 背景层次效果 */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .bg-grid {
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }
        
        .bg-glow {
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 245, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 170, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.04) 0%, transparent 60%);
        }
        
        /* 标题 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 32px 48px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, rgba(3, 7, 18, 0.9) 0%, transparent 100%);
        }
        
        .title-group {
            animation: fadeSlideDown 0.8s ease-out;
        }
        
        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 16px;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--text-primary) 50%, var(--accent-magenta) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 30px rgba(0, 245, 255, 0.3));
        }
        
        .subtitle {
            font-size: 11px;
            letter-spacing: 8px;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 300;
        }
        
        /* 侧边栏面板 */
        .sidebar {
            position: fixed;
            top: 50%;
            right: 32px;
            transform: translateY(-50%);
            z-index: 100;
            animation: fadeSlideLeft 0.8s ease-out 0.2s both;
        }
        
        @keyframes fadeSlideLeft {
            from {
                opacity: 0;
                transform: translateY(-50%) translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }
        
        .panel {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 245, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            min-width: 180px;
        }
        
        .panel-title {
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .city-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .city-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }
        
        .city-item:hover {
            background: rgba(0, 245, 255, 0.08);
            border-color: rgba(0, 245, 255, 0.2);
            transform: translateX(-4px);
        }
        
        .city-item.active {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.15) 0%, rgba(255, 0, 170, 0.1) 100%);
            border-color: rgba(0, 245, 255, 0.3);
            box-shadow: var(--glow-cyan);
        }
        
        .city-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
            position: relative;
        }
        
        .city-item.active .city-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid currentColor;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
        
        .city-name {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        /* 底部提示 */
        .footer-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 2px;
            animation: fadeIn 1s ease-out 0.5s both;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .footer-hint span {
            color: var(--accent-cyan);
        }
        
        /* 工具提示 */
        .tooltip {
            position: fixed;
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 200;
            box-shadow: var(--glow-cyan);
        }
        
        .tooltip strong {
            display: block;
            margin-bottom: 4px;
            font-size: 15px;
        }
        
        /* 加载动画 */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .loader-ring {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(0, 245, 255, 0.1);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader-text {
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--text-muted);
        }
        
        .hidden { display: none !important; }
    </style>
</head>

,[113.161519804688,27.1080178046875],[113.153170195313,27.1264479804688],[113.189386015625,27.140415265625],[113.207345,27.1368679023438],[113.231419707031,27.1416237617188],[113.251519804688,27.1696681953125],[113.281278105469,27.1811452460938],[113.244315214844,27.2393654609375],[113.227345,27.2438430000001],[113.233187285156,27.2794045234375],[113.200699492188,27.2927028632813],[113.203822050781,273138430000001],[113.200386992188,27.3370998359375],[113.25298953125,27.34819846875],[113.282984648438,27.3870583320313],[113.307345,27.3938430000001],[113.312899199219,27.3893971992188],[113.328914824219,27.3693971992188],[113.355731230469,27.379341046875],[113.388831816406,27.4206740546875],[113.510242949219,27.382485578125],[113.542808867188,27.4231545234376],[113.617345,27.413843],[113.623363066406,27.408843],[113.592806425781,27.3834596992188]]]]}},{"type":"Feature","properties":{"name":"醴陵市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.562806425781,27.9593044257813],[113.575279570313,27.8893190742188],[113.596224394531,27.9145314765625],[113.656627226563,27.8799343085938],[113.684608183594,27.8770827460938],[113.727345,27.8838430000001],[113.731339140625,27.877837140625],[113.749310332031,27.8658864570313],[113.753604765625,27.8488430000001],[113.751085234375,27.838843],[113.760982695313,27.7995607734375],[113.72533328125,27.7758547187501],[113.713350859375,27.757837140625],[113.701339140625,27.749848859375],[113.697345,27.723843],[113.674769316406,27.7064186835937],[113.632991972656,27.6522927070313],[113.600128203125,27.638843],[113.603084746094,27.6188430000001],[113.600867949219,27.603843],[113.603148222656,27.5884133125001],[113.57298953125,27.5477346015625],[113.585064726563,27.5206569648438],[113.602345,27.5181032539063],[113.630872832031,27.5223195625001],[113.587257109375,27.4634914375001],[113.60170046875,27.42819846875],[113.61298953125,27.4194875312501],[113.617345,27.413843],[113.542808867188,27.4231545234376],[113.510242949219,27.382485578125],[113.388831816406,27.4206740546875],[113.355731230469,27.379341046875],[113.328914824219,27.3693971992188],[113.312899199219,27.3893971992188],[113.307345,27.3938430000001],[113.299918242188,27.4375563789063],[113.26170046875,27.4481984687501],[113.22298953125,27.47948753125],[113.175543242188,27.4926979804688],[113.203519316406,27.539077375],[113.189049101563,27.5502468085938],[113.165750761719,27.607173078125],[113.19298953125,27.6281984687501],[113.204022246094,27.6424929023438],[113.201605253906,27.6588430000001],[113.203748808594,27.6733498359376],[113.225994902344,27.6905202460937],[113.242345,27.6881032539063],[113.268138457031,27.6919167304688],[113.294896269531,27.7265822578125],[113.288765898438,27.7680666328126],[113.321954375,27.7480471015626],[113.340943632813,27.7508522773437],[113.35447390625,27.7994411445312],[113.351600371094,27.8188771796876],[113.357345,27.8538430000001],[113.402806425781,27.8583815742188],[113.413787871094,27.8957936835938],[113.455201445313,27.913755109375],[113.472806425781,27.9283815742187],[113.481883574219,27.9393044257813],[113.512806425781,27.9483815742188],[113.529420195313,27.9683815742188],[113.562806425781,27.9593044257813]]]]}}]};

        // 县到市的映射
        const countyToCity = {};
        cityData.forEach(city => {
            const countyName = city.name === '渌口区' ? '株洲县' : city.name;
            countyToCity[countyName] = city;
        });

        // Three.js 场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030712);
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 45, 65);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;
        controls.minDistance = 20;
        controls.maxDistance = 120;

        // 灯光
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(30, 60, 30);
        scene.add(dirLight);

        // 坐标转换
        const centerLng = 113.5, centerLat = 27.0, scale = 80;
        function latLngToScene(lng, lat) {
            return { x: (lng - centerLng) * scale, z: -(lat - centerLat) * scale };
        }

        // 获取区块边界中心
        function getPolygonCenter(coords) {
            let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
            coords.forEach(c => {
                minLng = Math.min(minLng, c[0]); maxLng = Math.max(maxLng, c[0]);
                minLat = Math.min(minLat, c[1]); maxLat = Math.max(maxLat, c[1]);
            });
            return { lng: (minLng + maxLng) / 2, lat: (minLat + maxLat) / 2 };
        }

        const meshes = [];
        const cityMeshGroups = {};
        const cityCenters = {};

        // 创建地图
        geoData.features.forEach(feature => {
            const countyName = feature.properties.name;
            const city = countyToCity[countyName];
            if (!city) return;
            
            const cityName = city.name, color = city.color;
            if (!cityMeshGroups[cityName]) cityMeshGroups[cityName] = [];

            feature.geometry.coordinates.forEach(polygon => {
                const shape = new THREE.Shape();
                const points = polygon[0];
                if (!points || points.length < 3) return;
                
                const first = latLngToScene(points[0][0], points[0][1]);
                shape.moveTo(first.x, first.z);
                for (let i = 1; i < points.length; i++) {
                    const p = latLngToScene(points[i][0], points[i][1]);
                    shape.lineTo(p.x, p.z);
                }

                const geometry = new THREE.ExtrudeGeometry(shape, { depth: 5, bevelEnabled: true, bevelThickness: 0.4, bevelSize: 0.2, bevelSegments: 2 });
                geometry.rotateX(-Math.PI / 2);
                
                const material = new THREE.MeshPhongMaterial({ 
                    color: color, 
                    emissive: color, 
                    emissiveIntensity: 0.25,
                    shininess: 120, 
                    transparent: true, 
                    opacity: 0.88 
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.userData = { cityName, floatSpeed: 0.15 + Math.random() * 0.15, floatOffset: Math.random() * Math.PI * 2 };
                scene.add(mesh); 
                meshes.push(mesh);
                cityMeshGroups[cityName].push(mesh);
                
                // 发光边框
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.35, transparent: true }));
                scene.add(line);
            });
            
            // 计算城市中心
            const coords = feature.geometry.coordinates[0][0];
            const center = getPolygonCenter(coords);
            const scenePos = latLngToScene(center.lng, center.lat);
            
            if (!cityCenters[cityName]) { cityCenters[cityName] = { x: 0, z: 0, count: 0 }; }
            cityCenters[cityName].x += scenePos.x;
            cityCenters[cityName].z += scenePos.z;
            cityCenters[cityName].count++;
        });

        Object.keys(cityCenters).forEach(name => {
            const c = cityCenters[name];
            if (c.count > 0) { cityCenters[name].x /= c.count; cityCenters[name].z /= c.count; }
        });

        // 圆柱体
        const cylinders = {};
        
        function createCylinder(cityName) {
            const city = cityData.find(c => c.name === cityName);
            if (!city) return;
            
            const height = 22 + Math.random() * 12;
            const color = city.color;
            
            const cylGeom = new THREE.CylinderGeometry(1, 1.6, height, 32);
            const cylMat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.6, shininess: 150, transparent: true, opacity: 0.95 });
            const cylinder = new THREE.Mesh(cylGeom, cylMat);
            
            const center = cityCenters[cityName];
            cylinder.position.set(center.x, 0, center.z);
            
            // 顶部发光球
            const sphereGeom = new THREE.SphereGeometry(1.8, 32, 32);
            const sphereMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1, shininess: 200 });
            const sphere = new THREE.Mesh(sphereGeom, sphereMat);
            sphere.position.y = height / 2 + 0.5;
            cylinder.add(sphere);
            
            // 光柱
            const glowGeom = new THREE.CylinderGeometry(1.6, 2.2, height, 32, 1, true);
            const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
            cylinder.add(new THREE.Mesh(glowGeom, glowMat));
            
            cylinder.userData = { cityName, rising: true };
            cylinder.scale.y = 0.001;
            scene.add(cylinder);
            cylinders[cityName] = cylinder;
        }

        function toggleCylinder(cityName) {
            if (cylinders[cityName]) {
                cylinders[cityName].userData.rising = false;
                cylinders[cityName].userData.shrinking = true;
            } else {
                createCylinder(cityName);
            }
            updatePanel();
        }

        // UI 面板
        const cityList = document.getElementById('cityList');
        function updatePanel() {
            cityList.innerHTML = '';
            cityData.forEach(city => {
                const div = document.createElement('div');
                div.className = 'city-item' + (cylinders[city.name] ? ' active' : '');
                div.innerHTML = `<div class="city-dot" style="background:${city.accent};box-shadow:0 0 8px ${city.accent}"></div><span class="city-name">${city.name}</span>`;
                div.onclick = () => toggleCylinder(city.name);
                cityList.appendChild(div);
            });
        }
        updatePanel();
        document.getElementById('loader').classList.add('hidden');

        // 点击事件
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        renderer.domElement.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);
            if (intersects.length > 0) {
                const cityName = intersects[0].object.userData.cityName;
                if (cityName) {
                    toggleCylinder(cityName);
                    tooltip.innerHTML = `<strong>${cityName}</strong>点击切换指标`;
                    tooltip.style.left = event.clientX + 18 + 'px';
                    tooltip.style.top = event.clientY + 18 + 'px';
                    tooltip.style.display = 'block';
                    setTimeout(() => tooltip.style.display = 'none', 1800);
                }
            }
        });

        // 底座
        scene.add(new THREE.Mesh(new THREE.CircleGeometry(65, 64), new THREE.MeshBasicMaterial({ color: 0x060d18 })));
        const grid = new THREE.GridHelper(130, 18, 0x0a1525, 0x060d18);
        grid.position.y = -2;
        scene.add(grid);

        // 动画
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            meshes.forEach(mesh => {
                mesh.position.y = Math.sin(time * mesh.userData.floatSpeed + mesh.userData.floatOffset) * 0.6;
            });
            
            Object.values(cylinders).forEach(cyl => {
                if (cyl.userData.rising && cyl.scale.y < 1) {
                    cyl.scale.y = Math.min(cyl.scale.y + 0.025, 1);
                }
                if (cyl.userData.shrinking) {
                    cyl.scale.y -= 0.04;
                    if (cyl.scale.y <= 0.001) {
                        scene.remove(cyl);
                        delete cylinders[cyl.userData.cityName];
                        updatePanel();
                    }
                }
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
