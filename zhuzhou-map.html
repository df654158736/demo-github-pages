<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株洲市 · 3D可视化</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #0a0a0f; --text-primary: #f5f5f0; --text-secondary: #8a8a85; --accent-gold: #c9a227; --accent-copper: #b87333; --glass-bg: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: var(--bg-primary); font-family: 'Noto Serif SC', serif; color: var(--text-primary); }
        #container { width: 100vw; height: 100vh; position: fixed; }
        .hero-title { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; pointer-events: none; }
        .hero-title h1 { font-size: 42px; font-weight: 300; letter-spacing: 20px; color: var(--text-primary); text-shadow: 0 0 60px rgba(201,162,39,0.3); margin-bottom: 8px; }
        .hero-title .subtitle { font-family: 'Space Grotesk', sans-serif; font-size: 11px; letter-spacing: 8px; color: var(--text-secondary); text-transform: uppercase; }
        .city-panel { position: absolute; top: 50%; right: 40px; transform: translateY(-50%); background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 4px; padding: 24px 20px; z-index: 100; min-width: 180px; }
        .city-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-gold), transparent); opacity: 0.5; }
        .city-panel h3 { font-family: 'Space Grotesk', sans-serif; font-size: 10px; letter-spacing: 4px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--glass-border); }
        .city-item { display: flex; align-items: center; padding: 12px 0; cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); border-bottom: 1px solid rgba(255,255,255,0.03); }
        .city-item:last-child { border-bottom: none; }
        .city-item:hover { padding-left: 8px; }
        .city-item:hover .city-name { color: var(--text-primary); }
        .city-item.active { background: linear-gradient(90deg, rgba(201,162,39,0.1), transparent); border-left: 2px solid var(--accent-gold); padding-left: 12px; }
        .city-color { width: 8px; height: 8px; border-radius: 50%; margin-right: 14px; box-shadow: 0 0 12px currentColor; transition: transform 0.3s ease; }
        .city-item:hover .city-color { transform: scale(1.3); }
        .city-name { font-size: 14px; color: var(--text-secondary); transition: color 0.3s ease; letter-spacing: 2px; }
        .footer-info { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; }
        .footer-info p { font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: var(--text-secondary); letter-spacing: 2px; }
        .footer-info .divider { width: 40px; height: 1px; background: var(--accent-copper); margin: 12px auto; }
        .tooltip { position: absolute; background: rgba(10,10,15,0.95); border: 1px solid var(--accent-gold); color: var(--text-primary); padding: 14px 20px; border-radius: 2px; font-size: 13px; pointer-events: none; display: none; z-index: 200; backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: var(--text-secondary); letter-spacing: 4px; z-index: 300; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="hero-title"><h1>株 洲</h1><div class="subtitle">Zhuzhou · Interactive Map</div></div>
    <div id="container"></div>
    <div class="city-panel" id="cityPanel"><h3>行政区划</h3></div>
    <div class="footer-info"><div class="divider"></div><p>点击区县查看详情</p></div>
    <div class="tooltip" id="tooltip"></div>
    <div class="loading" id="loading">加载中...</div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
    const cityData = [
        {name:'天元区',color:0x00d4ff,counties:['天元区']},
        {name:'芦淞区',color:0xff6b6b,counties:['芦淞区']},
        {name:'石峰区',color:0x4ecdc4,counties:['石峰区']},
        {name:'荷塘区',color:0xffd93d,counties:['荷塘区']},
        {name:'渌口区',color:0x6bcb77,counties:['株洲县']},
        {name:'醴陵市',color:0xc56cf0,counties:['醴陵市']},
        {name:'攸县',color:0xff9f43,counties:['攸县']},
        {name:'茶陵县',color:0x00d2d3,counties:['茶陵县']},
        {name:'炎陵县',color:0xee5a24,counties:['炎陵县']}
    ];
    
    // 简化的GeoJSON - 核心城市数据
    const geoData = {"type":"FeatureCollection","features":[
        {"type":"Feature","properties":{"name":"株洲县"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.35,27.80],[113.34,27.75],[113.29,27.73],[113.27,27.69],[113.24,27.69],[113.20,27.67],[113.17,27.61],[113.19,27.55],[113.18,27.49],[113.22,27.48],[113.26,27.44],[113.30,27.39],[113.28,27.35],[113.25,27.31],[113.20,27.29],[113.23,27.24],[113.16,27.24],[113.10,27.20],[113.08,27.22],[113.04,27.24],[113.01,27.27],[112.99,27.32],[112.97,27.38],[112.99,27.44],[113.01,27.48],[113.00,27.52],[112.99,27.57],[113.01,27.62],[113.03,27.65],[113.00,27.66],[112.98,27.67],[113.00,27.69],[113.02,27.71],[113.06,27.72],[113.08,27.73],[113.11,27.73],[113.13,27.75],[113.17,27.75],[113.18,27.78],[113.22,27.76],[113.21,27.80],[113.24,27.83],[113.28,27.86],[113.32,27.87],[113.35,27.85],[113.36,27.82],[113.35,27.80]]]]}},
        {"type":"Feature","properties":{"name":"茶陵县"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.77,27.12],[113.80,27.10],[113.81,27.05],[113.85,27.02],[113.86,27.02],[113.87,26.99],[113.89,26.97],[113.92,26.96],[113.91,26.95],[113.90,26.92],[113.88,26.87],[113.86,26.85],[113.83,26.81],[113.84,26.79],[113.85,26.76],[113.86,26.65],[113.85,26.64],[113.85,26.61],[113.81,26.60],[113.76,26.54],[113.69,26.53],[113.63,26.52],[113.60,26.50],[113.59,26.51],[113.56,26.54],[113.55,26.58],[113.54,26.59],[113.53,26.60],[113.52,26.60],[113.51,26.60],[113.50,26.60],[113.48,26.57],[113.41,26.56],[113.40,26.65],[113.38,26.69],[113.41,26.74],[113.42,26.78],[113.39,26.80],[113.38,26.82],[113.36,26.83],[113.36,26.85],[113.36,26.87],[113.36,26.90],[113.36,26.93],[113.37,26.94],[113.41,26.95],[113.43,26.96],[113.47,26.94],[113.50,26.97],[113.51,26.99],[113.55,27.02],[113.60,27.04],[113.64,27.07],[113.67,27.08],[113.70,27.10],[113.75,27.12],[113.77,27.12]]]]}},
        {"type":"Feature","properties":{"name":"荷塘区"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.26,28.00],[113.27,27.99],[113.26,27.94],[113.28,27.92],[113.27,27.91],[113.27,27.89],[113.27,27.86],[113.24,27.86],[113.20,27.83],[113.15,27.83],[113.14,27.85],[113.14,27.86],[113.16,27.88],[113.14,27.89],[113.18,27.93],[113.19,27.96],[113.24,27.98],[113.25,27.99],[113.26,28.00]]]]},
        {"type":"Feature","properties":{"name":"芦淞区"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.15,27.83],[113.20,27.83],[113.20,27.83],[113.22,27.82],[113.21,27.79],[113.22,27.76],[113.18,27.77],[113.17,27.75],[113.14,27.77],[113.12,27.76],[113.11,27.77],[113.10,27.78],[113.14,27.81],[113.15,27.83]]]]},
        {"type":"Feature","properties":{"name":"石峰区"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.24,28.02],[113.25,28.01],[113.25,28.00],[113.25,27.99],[113.24,27.98],[113.19,27.96],[113.18,27.93],[113.14,27.89],[113.16,27.88],[113.14,27.86],[113.13,27.86],[113.13,27.85],[113.04,27.85],[113.05,27.91],[113.07,27.95],[113.09,27.95],[113.12,27.91],[113.13,27.93],[113.13,27.94],[113.14,27.96],[113.15,28.00],[113.17,28.01],[113.21,28.02],[113.23,28.02],[113.24,28.02]]]]},
        {"type":"Feature","properties":{"name":"天元区"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.12,27.76],[113.13,27.73],[113.11,27.73],[113.08,27.71],[113.06,27.72],[113.06,27.72],[113.05,27.73],[113.02,27.74],[113.03,27.77],[113.02,27.80],[113.00,27.81],[113.00,27.81],[113.00,27.83],[113.03,27.84],[113.04,27.85],[113.13,27.85],[113.13,27.84],[113.15,27.83],[113.14,27.81],[113.10,27.78],[113.11,27.77],[113.12,27.76]]]]},
        {"type":"Feature","properties":{"name":"炎陵县"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.88,26.64],[113.92,26.62],[113.97,26.62],[114.00,26.61],[114.02,26.59],[114.10,26.58],[114.07,26.51],[114.07,26.49],[114.09,26.48],[114.08,26.43],[114.09,26.41],[114.06,26.41],[114.03,26.38],[114.04,26.35],[114.02,26.29],[114.02,26.27],[113.98,26.25],[113.97,26.21],[113.94,26.20],[113.94,26.18],[113.91,26.17],[113.89,26.14],[113.86,26.13],[113.84,26.11],[113.82,26.09],[113.79,26.11],[113.77,26.10],[113.78,26.08],[113.76,26.07],[113.74,26.05],[113.72,26.06],[113.71,26.07],[113.69,26.10],[113.69,26.13],[113.72,26.14],[113.74,26.19],[113.71,26.23],[113.68,26.25],[113.65,26.27],[113.62,26.28],[113.61,26.28],[113.61,26.31],[113.60,26.32],[113.57,26.41],[113.61,26.43],[113.59,26.48],[113.60,26.50],[113.63,26.52],[113.69,26.53],[113.76,26.54],[113.81,26.60],[113.85,26.61],[113.85,26.64],[113.87,26.66],[113.88,26.64]]]]},
        {"type":"Feature","properties":{"name":"攸县"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.59,27.38],[113.61,27.36],[113.65,27.35],[113.67,27.33],[113.69,27.34],[113.73,27.36],[113.83,27.37],[113.87,27.38],[113.86,27.35],[113.85,27.30],[113.86,27.29],[113.85,27.27],[113.81,27.17],[113.79,27.16],[113.77,27.12],[113.75,27.12],[113.70,27.10],[113.67,27.08],[113.64,27.07],[113.60,27.04],[113.55,27.02],[113.51,26.99],[113.50,26.97],[113.47,26.94],[113.43,26.96],[113.41,26.95],[113.37,26.94],[113.36,26.93],[113.36,26.90],[113.36,26.87],[113.36,26.85],[113.36,26.83],[113.38,26.82],[113.39,26.80],[113.32,26.81],[113.29,26.78],[113.27,26.78],[113.27,26.80],[113.27,26.82],[113.27,26.83],[113.26,26.83],[113.24,26.85],[113.22,26.88],[113.23,26.89],[113.25,26.92],[113.28,26.94],[113.24,26.95],[113.21,26.97],[113.22,27.02],[113.21,27.03],[113.19,27.05],[113.18,27.08],[113.16,27.11],[113.15,27.13],[113.19,27.14],[113.21,27.14],[113.23,27.14],[113.25,27.17],[113.28,27.18],[113.24,27.24],[113.23,27.24],[113.23,27.28],[113.20,27.29],[113.20,27.31],[113.20,27.34],[113.25,27.35],[113.28,27.39],[113.31,27.39],[113.33,27.37],[113.36,27.38],[113.39,27.42],[113.51,27.38],[113.54,27.42],[113.62,27.41],[113.62,27.41],[113.59,27.38]]]]},
        {"type":"Feature","properties":{"name":"醴陵市"},"geometry":{"type":"MultiPolygon","coordinates":[[[[113.56,27.96],[113.58,27.89],[113.60,27.91],[113.66,27.88],[113.68,27.88],[113.73,27.88],[113.73,27.88],[113.75,27.87],[113.75,27.85],[113.75,27.84],[113.76,27.80],[113.73,27.78],[113.71,27.76],[113.70,27.75],[113.70,27.72],[113.67,27.71],[113.63,27.65],[113.60,27.64],[113.60,27.62],[113.60,27.60],[113.60,27.59],[113.57,27.55],[113.59,27.52],[113.60,27.52],[113.63,27.52],[113.59,27.46],[113.60,27.43],[113.61,27.42],[113.62,27.41],[113.54,27.42],[113.51,27.38],[113.39,27.42],[113.36,27.38],[113.33,27.37],[113.31,27.39],[113.31,27.39],[113.30,27.44],[113.26,27.45],[113.22,27.48],[113.18,27.49],[113.20,27.54],[113.19,27.55],[113.17,27.61],[113.19,27.63],[113.20,27.64],[113.20,27.66],[113.20,27.67],[113.23,27.69],[113.24,27.69],[113.27,27.69],[113.29,27.73],[113.29,27.77],[113.32,27.75],[113.34,27.75],[113.35,27.80],[113.36,27.82],[113.36,27.85],[113.40,27.86],[113.41,27.90],[113.46,27.91],[113.47,27.93],[113.48,27.94],[113.51,27.95],[113.53,27.97],[113.56,27.96]]]]}
    ]};

    const countyToCity = {};
    cityData.forEach(city => { city.counties.forEach(county => { countyToCity[county] = city; }); });

    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0a0f);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 50, 70);
    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping=true; controls.dampingFactor=0.05; controls.autoRotate=true; controls.autoRotateSpeed=0.5; controls.minDistance=20; controls.maxDistance=150;

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6); dirLight.position.set(50,80,50); scene.add(dirLight);
    [{color:0x00d4ff,pos:[20,30,20]},{color:0xff6b6b,pos:[-20,30,-20]},{color:0xc56cf0,pos:[0,30,-30]}].forEach(l=>{const pl=new THREE.PointLight(l.color,0.3,100);pl.position.set(...l.pos);scene.add(pl);});

    const centerLng=113.5, centerLat=27.0, scale=80;
    function latLngToScene(lng,lat){return{x:(lng-centerLng)*scale,z:-(lat-centerLat)*scale};}

    const meshes=[]; const cityCenters={};

    geoData.features.forEach(feature=>{
        const countyName=feature.properties.name;
        const city=countyToCity[countyName];
        if(!city)return;
        const color=city.color; const cityName=city.name;
        const coords=feature.geometry.coordinates[0][0];
        
        let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
        coords.forEach(p=>{const s=latLngToScene(p[0],p[1]);minX=Math.min(minX,s.x);maxX=Math.max(maxX,s.x);minZ=Math.min(minZ,s.z);maxZ=Math.max(maxZ,s.z);});
        const cx=(minX+maxX)/2, cz=(minZ+maxZ)/2;
        if(!cityCenters[cityName]){cityCenters[cityName]={x:0,z:0,c:0};}
        cityCenters[cityName].x+=cx; cityCenters[cityName].z+=cz; cityCenters[cityName].c++;
        
        const shape=new THREE.Shape();
        const first=latLngToScene(coords[0][0],coords[0][1]);
        shape.moveTo(first.x,first.z);
        for(let i=1;i<coords.length;i++){const p=latLngToScene(coords[i][0],coords[i][1]);shape.lineTo(p.x,p.z);}
        
        const geometry=new THREE.ExtrudeGeometry(shape,{depth:6,bevelEnabled:true,bevelThickness:0.5,bevelSize:0.3,bevelSegments:3});
        geometry.rotateX(-Math.PI/2);
        const material=new THREE.MeshPhongMaterial({color:color,emissive:color,emissiveIntensity:0.2,shininess:100,transparent:true,opacity:0.85});
        const mesh=new THREE.Mesh(geometry,material);
        mesh.userData={cityName:cityName,floatSpeed:0.2+Math.random()*0.2,floatOffset:Math.random()*Math.PI*2};
        scene.add(mesh);meshes.push(mesh);
        
        const edges=new THREE.EdgesGeometry(geometry);
        const line=new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0xffffff,opacity:0.4,transparent:true}));
        scene.add(line);
    });

    Object.keys(cityCenters).forEach(k=>{if(cityCenters[k].c>0){cityCenters[k].x/=cityCenters[k].c;cityCenters[k].z/=cityCenters[k].c;}});

    const cylinders={};
    function createCylinder(cityName){
        const city=cityData.find(c=>c.name===cityName);
        if(!city||!cityCenters[cityName])return;
        const height=25+Math.random()*15, color=city.color, center=cityCenters[cityName];
        
        const cylGeom=new THREE.CylinderGeometry(1.2,1.8,height,32);
        const cylMat=new THREE.MeshPhongMaterial({color:color,emissive:color,emissiveIntensity:0.5,shininess:120,transparent:true,opacity:0.95});
        const cylinder=new THREE.Mesh(cylGeom,cylMat);
        cylinder.position.set(center.x,0,center.z);
        
        const sphereGeom=new THREE.SphereGeometry(2,32,32);
        const sphereMat=new THREE.MeshPhongMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.8,shininess:150});
        const sphere=new THREE.Mesh(sphereGeom,sphereMat);
        sphere.position.y=height/2+1;
        cylinder.add(sphere);
        
        const glowGeom=new THREE.CylinderGeometry(2,2.5,height,32,1,true);
        const glowMat=new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.15,side:THREE.DoubleSide});
        cylinder.add(new THREE.Mesh(glowGeom,glowMat));
        
        cylinder.userData={cityName:cityName,rising:true};
        cylinder.scale.y=0.001;
        scene.add(cylinder);
        cylinders[cityName]=cylinder;
    }

    function toggleCylinder(cityName){
        if(cylinders[cityName]){cylinders[cityName].userData.rising=false;cylinders[cityName].userData.shrinking=true;}
        else{createCylinder(cityName);}
        updatePanel();
    }

    const cityPanel=document.getElementById('cityPanel');
    function updatePanel(){
        cityPanel.innerHTML='<h3>行政区划</h3>';
        cityData.forEach(city=>{
            const div=document.createElement('div');
            div.className='city-item'+(cylinders[city.name]?' active':'');
            div.innerHTML='<div class="city-color" style="background:#'+city.color.toString(16).padStart(6,'0')+';box-shadow:0 0 12px #'+city.color.toString(16).padStart(6,'0')+'"></div><span class="city-name">'+city.name+'</span>';
            div.onclick=()=>toggleCylinder(city.name);
            cityPanel.appendChild(div);
        });
    }
    updatePanel();document.getElementById('loading').style.display='none';

    const raycaster=new THREE.Raycaster(); const mouse=new THREE.Vector2(); const tooltip=document.getElementById('tooltip');
    renderer.domElement.addEventListener('click',e=>{
        mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;
        raycaster.setFromCamera(mouse,camera);
        const intersects=raycaster.intersectObjects(meshes);
        if(intersects.length>0){
            const cityName=intersects[0].object.userData.cityName;
            if(cityName){toggleCylinder(cityName);tooltip.innerHTML='<strong>'+cityName+'</strong>';tooltip.style.left=e.clientX+15+'px';tooltip.style.top=e.clientY+15+'px';tooltip.style.display='block';setTimeout(()=>tooltip.style.display='none',1500);}
        }
    });

    scene.add(new THREE.Mesh(new THREE.CircleGeometry(70,64),new THREE.MeshBasicMaterial({color:0x0a0a1a,transparent:true,opacity:0.9})));
    scene.add(new THREE.GridHelper(140,20,0x1a1a3a,0x0a0a1a));

    let time=0;
    function animate(){
        requestAnimationFrame(animate);time+=0.016;
        meshes.forEach(mesh=>{mesh.position.y=Math.sin(time*mesh.userData.floatSpeed+mesh.userData.floatOffset)*0.8;});
        Object.values(cylinders).forEach(cyl=>{
            if(cyl.userData.rising&&cyl.scale.y<1){cyl.scale.y+=0.03;if(cyl.scale.y>1)cyl.scale.y=1;}
            if(cyl.userData.shrinking){cyl.scale.y-=0.05;if(cyl.scale.y<=0.001){scene.remove(cyl);delete cylinders[cyl.userData.cityName];updatePanel();}}
        });
        controls.update();renderer.render(scene,camera);
    }
    animate();
    window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
    </script>
</body>
</html>
